<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthBear Updates</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            color: #2dd4bf;
            margin-bottom: 1rem;
        }
        p {
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .update-badge {
            display: inline-block;
            background: rgba(45, 212, 191, 0.1);
            color: #2dd4bf;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="update-badge">v1.0.0 is Live</div>
        <h1>HealthBear Updates</h1>
        <p>Welcome to the official update channel for HealthBear. We are constantly improving our clinic management system to provide the best experience for healthcare professionals.</p>
    </div>
</body>
</html>
